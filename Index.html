<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        body { font-family: sans-serif; background-color: #ecf0f1; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center; height: 90vh; }
        .container { background: white; border-radius: 12px; padding: 40px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2 { color: #2c3e50; margin-top: 0; margin-bottom: 20px; font-size: 24px; }
        
        .success-box { background: #e8f8f5; border: 2px solid #1abc9c; padding: 20px; border-radius: 8px; color: #27ae60; font-size: 18px; margin-bottom: 20px; font-weight: bold; }
        .istruzioni { color: #34495e; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Assistenza NO RIVAL</h2>
        <div class="success-box">✅ Connessione Stabilita</div>
        <div class="istruzioni">
            I tuoi dati del POS sono pronti.<br><br>
            Clicca sul <strong>pallino della chat</strong> in basso a destra per parlare direttamente con noi!
        </div>
    </div>

    <call-us-selector id="widget-3cx" phonesystem-url="https://norival.my3cx.it" party="LiveChat385165"></call-us-selector>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || '12345';
        const locationName = urlParams.get('loc') || 'sede';

        const locationFormattata = locationName.replace(/\s+/g, '').toLowerCase();
        const datoCompleto = businessId + '-' + locationFormattata;

        const widget = document.getElementById('widget-3cx');
        if(widget) {
            widget.setAttribute('visitor-name', datoCompleto);
            widget.setAttribute('default-user-name', datoCompleto);
        }
    </script>

    <script defer src="https://downloads-global.3cx.com/downloads/livechatandtalk/v1/callus.js" id="tcx-callus-js" charset="utf-8"></script>

</body>
</html>
