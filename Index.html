<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        /* Reset e font moderni stile iPad/Apple */
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; 
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f6f9 100%);
        }

        /* Layout: Centriamo in verticale, ma spostiamo a sinistra per fare spazio alla chat */
        .layout-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-left: 12%; 
            box-sizing: border-box;
        }

        /* Il riquadro bianco essenziale */
        .container { 
            background: white; 
            border-radius: 18px; 
            padding: 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 420px; 
            text-align: center; 
        }

        h2 { 
            color: #1e293b; 
            margin-top: 0; 
            margin-bottom: 10px; 
            font-size: 26px; 
            font-weight: 700;
        }
        
        .benvenuto {
            color: #3b82f6;
            font-size: 22px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        .istruzioni { 
            color: #64748b; 
            font-size: 16px; 
            line-height: 1.5; 
        }

        @media (max-width: 900px) {
            .layout-wrapper {
                justify-content: center;
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="container">
            <h2>Assistenza NO RIVAL</h2>
            <div class="benvenuto">Benvenuto <span id="display-user"></span></div>
            
            <div class="istruzioni">
                Siamo a tua disposizione.<br>Clicca sul pallino in basso a destra per avviare la chat.
            </div>
        </div>
    </div>

    <call-us-selector id="widget-3cx" phonesystem-url="https://norival.my3cx.it" party="LiveChat385165"></call-us-selector>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || '12345';
        let locationName = urlParams.get('loc') || 'sede';
        let userName = urlParams.get('user') || urlParams.get('username') || 'Utente';
        
        // FILTRO PULIZIA: Rimuove asterischi e simboli speciali che bloccano 3CX
        locationName = locationName.replace(/[*#@!$%&]/g, '');
        userName = userName.replace(/[*#@!$%&]/g, '');
        
        // Mostra il nome a schermo pulito
        document.getElementById('display-user').innerText = userName.trim();

        // Prepara il dato per la chat mantenendo gli spazi
        const locationFormattata = locationName.trim();
        const userFormattato = userName.trim(); 
        const datoCompleto = userFormattato + '-' + businessId + '-' + locationFormattata;

        // Inietta il dato nel widget
        const widget = document.getElementById('widget-3cx');
        if(widget) {
            widget.setAttribute('visitor-name', datoCompleto);
            widget.setAttribute('default-user-name', datoCompleto);
        }
    </script>

    <script defer src="https://downloads-global.3cx.com/downloads/livechatandtalk/v1/callus.js" id="tcx-callus-js" charset="utf-8"></script>

</body>
</html>
