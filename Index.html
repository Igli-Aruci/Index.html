<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        body { font-family: sans-serif; background-color: #ecf0f1; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 40px auto; }
        h2 { color: #2c3e50; margin-top: 0; }
        .istruzioni { color: #7f8c8d; font-size: 16px; margin-bottom: 20px; }
        
        /* Riquadro che evidenzia i dati da copiare */
        .dati-box { background: #e8f8f5; border: 2px dashed #1abc9c; padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 18px; color: #2c3e50; }
        .highlight { font-weight: bold; color: #e67e22; font-size: 24px; display: block; margin-top: 5px; margin-bottom: 15px; }
        
        /* Stile base per i pulsanti */
        .btn { color: white; border: none; padding: 18px 30px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; display: block; transition: 0.2s; }
        .btn:active { transform: translateY(2px); }
        
        /* Pulsante principale Chat */
        .btn-chat { background: #3498db; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); margin-bottom: 15px; }
        .btn-chat:active { background: #2980b9; }

        /* Pulsante secondario Refresh */
        .btn-refresh { background: #95a5a6; box-shadow: 0 4px 6px rgba(149, 165, 166, 0.3); font-size: 16px; padding: 14px 20px; }
        .btn-refresh:active { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Assistenza NO RIVAL</h2>
        <p class="istruzioni">Guarda questi dati d'accesso, ti serviranno per la chat:</p>
        
        <div class="dati-box">
            Nome: <span class="highlight" id="mostra-nome">...</span>
            Email / Sede: <span class="highlight" id="mostra-email">...</span>
        </div>

        <p style="font-size: 14px; color: #95a5a6; margin-bottom: 25px;">
            Memorizzali e clicca sul pulsante qui sotto per parlare con noi.
        </p>
        
        <button class="btn btn-chat" onclick="apriChat()">Apri Chat 3CX</button>
        
        <button class="btn btn-refresh" onclick="window.location.reload()">🔄 Aggiorna Pagina</button>
    </div>

    <script>
        // Prende i dati dall'URL di LightSpeed
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || 'Cliente POS';
        const locationName = urlParams.get('loc') || 'Sede';

        // Mostra i dati a schermo 
        document.getElementById('mostra-nome').innerText = businessId;
        document.getElementById('mostra-email').innerText = locationName;

        // Funzione che scatta quando si preme il pulsante principale
        function apriChat() {
            // Sostituisce questa pagina con la chat ufficiale, senza iframe!
            window.location.replace("https://norival.my3cx.it/LiveChat403792");
        }
    </script>

</body>
</html>
