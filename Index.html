<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        /* Reset e font moderni */
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; background-image: radial-gradient(circle at center, #ffffff 0%, #f4f6f9 100%);
        }

        /* Layout */
        .layout-wrapper { display: flex; align-items: center; justify-content: flex-start; min-height: 100vh; padding-left: 12%; box-sizing: border-box; }
        
        .container { background: white; border-radius: 18px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center; position: relative; }

        h2 { color: #1e293b; margin-top: 0; margin-bottom: 10px; font-size: 26px; font-weight: 700; }
        .benvenuto { color: #3b82f6; font-size: 22px; font-weight: 600; margin-top: 0; margin-bottom: 20px; }
        .istruzioni { color: #64748b; font-size: 16px; line-height: 1.5; }

        hr { border: 0; height: 1px; background: #e2e8f0; margin: 30px 0; }
        
        /* Scanner Animazione */
        .scanner-status { font-size: 13px; color: #f59e0b; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .radar-dot { width: 10px; height: 10px; background-color: #f59e0b; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }

        /* Generatore manuale (Piano B) */
        .qr-title { font-size: 15px; color: #475569; font-weight: 600; margin-bottom: 12px; }
        .qr-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; margin-bottom: 12px; font-size: 15px; text-align: center; outline: none; background: #f8fafc; transition: 0.2s; }
        .qr-input:focus { border-color: #10b981; background: white; }
        .qr-btn { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .qr-btn:active { transform: translateY(2px); box-shadow: none; }

        #qr-result { margin-top: 20px; display: none; animation: fadeIn 0.4s ease-out; }
        #qr-image { width: 180px; height: 180px; border-radius: 12px; border: 3px solid #f1f5f9; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .layout-wrapper { justify-content: center; padding-left: 20px; padding-right: 20px; } }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="container">
            <h2>Assistenza NO RIVAL</h2>
            <div class="benvenuto">Benvenuto <span id="display-user"></span></div>
            
            <div class="istruzioni">
                Siamo a tua disposizione.<br>Clicca sul pallino in basso a destra per avviare la chat.
            </div>

            <hr>
            
            <div id="scanner-box" class="scanner-status">
                <div class="radar-dot"></div> Ascolto comunicazioni segrete in corso...
            </div>

            <div id="manual-box">
                <div class="qr-title">Se lo scanner non si attiva:</div>
                <input type="text" id="link-input" class="qr-input" placeholder="Tieni premuto sul link in chat e incolla qui">
                <button onclick="generaQRManuale()" class="qr-btn">📱 Genera QR Code</button>
            </div>
            
            <div id="qr-result">
                <div style="font-size: 16px; color: #10b981; font-weight: bold; margin-bottom: 10px;">✅ Link Google Meet Intercettato!</div>
                <img id="qr-image" src="" alt="QR Code">
                <div style="font-size: 13px; color: #94a3b8; margin-top: 8px;">Inquadra questo codice con il telefono</div>
            </div>

        </div>
    </div>

    <call-us-selector id="widget-3cx" phonesystem-url="https://norival.my3cx.it" party="LiveChat385165"></call-us-selector>
    
    <script>
        // ==========================================
        // 1. GESTIONE DATI UTENTE
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || '12345';
        let locationName = urlParams.get('loc') || 'sede';
        let userName = urlParams.get('user') || urlParams.get('username') || 'Utente';
        
        locationName = locationName.replace(/[*#@!$%&]/g, '');
        userName = userName.replace(/[*#@!$%&]/g, '');
        document.getElementById('display-user').innerText = userName.trim();

        const locationFormattata = locationName.trim();
        const userFormattato = userName.trim(); 
        const datoCompleto = userFormattato + '-' + businessId + '-' + locationFormattata;

        const widget = document.getElementById('widget-3cx');
        if(widget) {
            widget.setAttribute('visitor-name', datoCompleto);
            widget.setAttribute('default-user-name', datoCompleto);
        }

        // ==========================================
        // 2. IL RADAR "MICROSPIA" DEFINITIVO
        // ==========================================
        let scannerAttivo = true;

        // Funzione per generare il QR e fermare il radar
        function trovatoLink(link) {
            if (!scannerAttivo) return;
            scannerAttivo = false;
            document.getElementById('scanner-box').style.display = 'none';
            document.getElementById('manual-box').style.display = 'none';
            
            if(!link.startsWith('http://') && !link.startsWith('https://')) { link = 'https://' + link; }
            const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(link);
            document.getElementById('qr-image').src = qrUrl;
            document.getElementById('qr-result').style.display = 'block';
        }

        const regexMeet = /meet\.google\.com\/[a-z0-9-]+/i;

        // METODO A: Ascoltare i segnali nascosti di 3CX (postMessage)
        window.addEventListener('message', function(event) {
            if (!scannerAttivo) return;
            // Se nel segnale di rete c'è la stringa di meet... boom!
            try {
                const dataString = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
                const match = dataString.match(regexMeet);
                if (match) {
                    trovatoLink(match[0]);
                }
            } catch (e) { }
        });

        // METODO B: MutationObserver super-aggressivo su tutto il documento
        const observer = new MutationObserver((mutations) => {
            if (!scannerAttivo) return;
            for (let mutation of mutations) {
                // Guarda nei nuovi nodi inseriti
                if (mutation.addedNodes.length) {
                    mutation.addedNodes.forEach(node => {
                        if (node.textContent && node.textContent.match(regexMeet)) {
                            trovatoLink(node.textContent.match(regexMeet)[0]);
                        }
                    });
                }
                // Guarda se cambia il testo di un nodo esistente
                if (mutation.type === 'characterData' && mutation.target.textContent.match(regexMeet)) {
                    trovatoLink(mutation.target.textContent.match(regexMeet)[0]);
                }
            }
        });

        // Avviamo l'osservazione su tutto il body e i suoi figli
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });

        // ==========================================
        // 3. GENERATORE MANUALE (Piano di riserva)
        // ==========================================
        function generaQRManuale() {
            let link = document.getElementById('link-input').value.trim();
            const match = link.match(regexMeet);
            // Estrai solo il link se per caso incollano tutto il testo
            let finalLink = match ? match[0] : link; 
            
            if(finalLink) {
                trovatoLink(finalLink);
            } else {
                alert("Per favore, incolla il link della chat!");
            }
        }
    </script>

    <script defer src="https://downloads-global.3cx.com/downloads/livechatandtalk/v1/callus.js" id="tcx-callus-js" charset="utf-8"></script>

</body>
</html>
