<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20%; color: #666; }
    </style>
</head>
<body>
    <p>Caricamento della chat di supporto in corso...</p>

    <script>
        // 1. Recupera il Business ID dall'URL inviato da LightSpeed
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || 'Cliente-POS';

        // 2. Crea il link di 3CX compilando sia Nome che Email (per superare il blocco iniziale)
        const targetUrl = `https://norival.my3cx.it/LiveChat403792?name=${encodeURIComponent(businessId)}&email=${encodeURIComponent(businessId)}@norival.com`;

        // 3. Reindirizza istantaneamente il tablet alla chat
        window.location.replace(targetUrl);
    </script>
</body>
</html>
