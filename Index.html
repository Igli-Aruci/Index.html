<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        /* Reset e font moderni stile iPad/Apple */
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; 
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f6f9 100%);
        }

        /* Layout: Centriamo in verticale, ma spostiamo a sinistra per fare spazio alla chat */
        .layout-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-left: 12%; /* Lascia lo spazio perfetto a destra per la chat di 3CX */
            box-sizing: border-box;
        }

        /* Il riquadro bianco */
        .container { 
            background: white; 
            border-radius: 18px; 
            padding: 45px 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 420px; 
            text-align: center; 
        }

        h2 { 
            color: #1e293b; 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-size: 26px; 
            font-weight: 700;
        }
        
        .success-box { 
            background: #ecfdf5; 
            border: 2px solid #10b981; 
            padding: 16px; 
            border-radius: 12px; 
            color: #059669; 
            font-size: 18px; 
            margin-bottom: 25px; 
            font-weight: 600; 
        }
        
        .istruzioni { 
            color: #475569; 
            font-size: 18px; 
            line-height: 1.6; 
        }

        .istruzioni strong {
            color: #0f172a;
        }

        /* Se il tablet viene girato in verticale (schermo più stretto), centra di nuovo il riquadro */
        @media (max-width: 900px) {
            .layout-wrapper {
                justify-content: center;
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="container">
            <h2>Assistenza NO RIVAL</h2>
            
            <div class="success-box">
                ✅ Connessione Stabilita
            </div>
            
            <div class="istruzioni">
                I tuoi dati del POS sono pronti.<br><br>
                Clicca sul <strong>pallino della chat</strong> in basso a destra per parlare direttamente con noi!
            </div>
        </div>
    </div>

    <call-us-selector id="widget-3cx" phonesystem-url="https://norival.my3cx.it" party="LiveChat385165"></call-us-selector>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('id') || '12345';
        const locationName = urlParams.get('loc') || 'sede';

        const locationFormattata = locationName.replace(/\s+/g, '').toLowerCase();
        const datoCompleto = businessId + '-' + locationFormattata;

        const widget = document.getElementById('widget-3cx');
        if(widget) {
            widget.setAttribute('visitor-name', datoCompleto);
            widget.setAttribute('default-user-name', datoCompleto);
        }
    </script>

    <script defer src="https://downloads-global.3cx.com/downloads/livechatandtalk/v1/callus.js" id="tcx-callus-js" charset="utf-8"></script>

</body>
</html>
