<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto POS</title>
    <style>
        /* Reset e font moderni stile iPad/Apple */
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f9; 
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f6f9 100%);
        }

        /* Layout: Centriamo in verticale, ma spostiamo a sinistra per fare spazio alla chat */
        .layout-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-left: 12%; 
            box-sizing: border-box;
        }

        /* Il riquadro bianco essenziale */
        .container { 
            background: white; 
            border-radius: 18px; 
            padding: 40px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 420px; 
            text-align: center; 
        }

        h2 { 
            color: #1e293b; 
            margin-top: 0; 
            margin-bottom: 10px; 
            font-size: 26px; 
            font-weight: 700;
        }
        
        .benvenuto {
            color: #3b82f6;
            font-size: 22px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        .istruzioni { 
            color: #64748b; 
            font-size: 16px; 
            line-height: 1.5; 
        }

        @media (max-width: 900px) {
            .layout-wrapper {
                justify-content: center;
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>
